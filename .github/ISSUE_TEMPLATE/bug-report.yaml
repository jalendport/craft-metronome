name: Bug report
description: Something isn't working the way it should.
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead? Include steps to reproduce.
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
    validations:
      required: true
  - type: input
    id: craft-version
    attributes:
      label: Craft CMS version
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
